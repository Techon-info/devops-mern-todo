name: MERN CI

on:
  push:
    branches: [main]

jobs:
  mongo-init:
    runs-on: ububtu-latest

    services:
      mongo:
        image: mongo
        ports: ['27017:27017']
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Waiting for MongoDB to be ready
        run: |
          unril nc -z localhost 27017:27017; do
            echo "Waiting for MongoDB..."
            sleeo 2
          done
            echo "MongoDB is up"
      - name: seed MongoDB
        working-directory: ./backend
        run: |
          npm install
          node seedTasksData.js 

  test:
    runs-on: ububtu-latest
    needs: mongo-init

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install Dependencies for backend 
        working-directory: ./backend
        run: npm install

      - name: Running Backend Tests
        working-directory: ./backend
        run: npm test